server:
  port: 8088

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tourism_warning?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000

  devtools:
    restart:
      enabled: false # 禁用 devtools 热重启，解决重新运行时端口被占用的问题
      
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.scenic.warning.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 客流模拟器配置
simulator:
  enabled: true
  interval-ms: 5000

# Python ARIMA 脚本路径
arima:
  python-path: python
  script-path: ../python/arima_predict.py

logging:
  level:
    com.scenic.warning: debug

# AI 大模型配置 (DeepSeek)
ai:
  deepseek:
    api-key: sk-621fe659f0f94ab5893e96f537822cc7
    base-url: https://api.deepseek.com/chat/completions
    model: deepseek-chat

